<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Brea Job Hub</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(to right,#dbeafe,#f0f9ff);
}

header {
  background:linear-gradient(135deg,#002855,#00a8e8);
  color:white;
  text-align:center;
  padding:20px;
}

nav {
  background:#001d3d;
  display:flex;
  justify-content:center;
}

nav a {
  color:white;
  padding:12px;
  text-decoration:none;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  margin:15px 0;
  border-radius:12px;
  border-left:6px solid #00a8e8;
}

button {
  background:#00a8e8;
  border:none;
  padding:10px;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

input, select, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
}

.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-content {
  background:white;
  padding:20px;
  max-width:400px;
  margin:10% auto;
}
</style>
</head>

<body>

<header>
<h1>La Brea Job Hub</h1>
<p>Jobs • Training • Career Guidance</p>
</header>

<nav>
<a href="#">Jobs</a>
<a href="#">Training</a>
<a href="#">Counseling</a>
</nav>

<div class="container">

<!-- QUICK START -->
<div class="card">
<h3>🎯 Find Your Path</h3>
<button onclick="quickStart('fast')">Get Job Fast</button>
<button onclick="quickStart('skill')">Learn Skill</button>
<button onclick="quickStart('career')">Build Career</button>
</div>

<!-- AUTH -->
<div class="card">
<h3>Account</h3>
<input id="authEmail" placeholder="Email">
<input id="authPassword" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<p id="userStatus"></p>
</div>

<!-- COUNSELING -->
<div class="card">
<h3>🧠 Career Counseling</h3>
<input id="name" placeholder="Name">
<input id="age" placeholder="Age">

<select id="interest">
<option>Hands-on work</option>
<option>Office work</option>
<option>Outdoor work</option>
<option>Technical career</option>
</select>

<select id="education">
<option>Secondary</option>
<option>CXC</option>
<option>Experience</option>
</select>

<select id="goal">
<option>Get job fast</option>
<option>Learn skill</option>
<option>Career</option>
</select>

<input type="date" id="date">

<button onclick="bookSession()">Book Appointment</button>
</div>

<!-- TRAINING RECOMMEND -->
<div class="card">
<h3>🤖 Recommended Training</h3>
<button onclick="recommendTraining()">Get Recommendation</button>
<p id="recommendResult"></p>
</div>

<!-- TRAINING -->
<div class="card">
<h3>📚 Training Programs</h3>
<div id="trainingList"></div>
</div>

<!-- SEARCH -->
<input placeholder="Search jobs..." onkeyup="filterJobs(this.value)">

<select onchange="filterCategory(this.value)">
<option>All</option>
<option>Trade</option>
<option>Oil & Gas</option>
<option>Renewable Energy</option>
</select>

<!-- JOBS -->
<div id="jobList"></div>

<!-- ADMIN -->
<div id="adminPanel" class="card" style="display:none;">
<h3>Post Job</h3>
<input id="jobTitle" placeholder="Title">
<input id="company" placeholder="Company">
<input id="location" placeholder="Location">
<input id="salary" placeholder="Salary">

<select id="category">
<option>Trade</option>
<option>Oil & Gas</option>
<option>Renewable Energy</option>
</select>

<select id="experience">
<option>No Experience</option>
<option>Some Experience</option>
</select>

<textarea id="description" placeholder="Description"></textarea>

<button onclick="postJob()">Submit</button>
</div>

<!-- DASHBOARDS -->
<div id="myApps" class="card"></div>
<div id="trainingDashboard" class="card"></div>

</div>

<!-- JOB APPLY MODAL -->
<div class="modal" id="formModal">
<div class="modal-content">
<h3>Apply for Job</h3>
<input type="file" id="resume">
<button onclick="submitApplication()">Submit</button>
<button onclick="closeForm()">Close</button>
</div>
</div>

<!-- TRAINING APPLY MODAL -->
<div class="modal" id="trainingModal">
<div class="modal-content">
<h3>Apply for Training</h3>
<input id="tName" placeholder="Full Name">
<input id="tPhone" placeholder="Phone">
<input id="tReason" placeholder="Why interested?">
<button onclick="submitTrainingApp()">Submit</button>
<button onclick="closeTraining()">Close</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app = initializeApp({
  apiKey:"YOUR-KEY",
  authDomain:"YOUR.firebaseapp.com",
  projectId:"YOUR-ID",
  storageBucket:"YOUR.appspot.com"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* AUTH */
window.signup = async()=>{
  let user = await createUserWithEmailAndPassword(auth, authEmail.value, authPassword.value);
  await setDoc(doc(db,"users",user.user.uid),{email:authEmail.value,role:"jobseeker"});
};

window.login = async()=>{
  await signInWithEmailAndPassword(auth, authEmail.value, authPassword.value);
};

/* SESSION */
onAuthStateChanged(auth, async(user)=>{
  if(user){
    userStatus.innerText="Logged in: "+user.email;
    loadJobs();
    loadApps();
    loadTraining();
    loadTrainingDashboard();

    let snap = await getDoc(doc(db,"users",user.uid));
    if(snap.data().role==="employer"){
      adminPanel.style.display="block";
    }
  }
});

/* JOBS */
async function loadJobs(){
  let list = document.getElementById("jobList");
  list.innerHTML="";

  let snap = await getDocs(collection(db,"jobs"));
  snap.forEach(d=>{
    let job=d.data();
    if(!job.approved) return;

    let div=document.createElement("div");
    div.className="card";
    div.dataset.category=job.category;

    div.innerHTML=`
      <h3>${job.title}</h3>
      <p>${job.company} - ${job.location}</p>
      <p>${job.description}</p>
      <p>${job.category} | ${job.experience}</p>
      <p>💰 ${job.salary||"N/A"}</p>
      <button onclick="apply('${job.title}')">Apply</button>
    `;

    list.appendChild(div);
  });
}

window.apply=(job)=>{
  formModal.style.display="block";
  window.selectedJob=job;
};

window.submitApplication=async()=>{
  let user=auth.currentUser;
  let file=resume.files[0];

  let r=ref(storage,"resumes/"+user.uid+"_"+file.name);
  await uploadBytes(r,file);
  let url=await getDownloadURL(r);

  await addDoc(collection(db,"applications"),{
    user:user.email,job:selectedJob,resume:url
  });

  alert("Application sent!");
};

/* TRAINING */
async function loadTraining(){
  let list=document.getElementById("trainingList");
  list.innerHTML="";

  let snap=await getDocs(collection(db,"training"));
  snap.forEach(docSnap=>{
    let t=docSnap.data();

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h3>${t.title}</h3>
      <p>${t.description}</p>
      <p>📍 ${t.location}</p>
      <p>⏳ ${t.duration}</p>
      <p>🎯 ${t.outcome}</p>
      <p>💲 ${t.cost}</p>
      <p>📅 ${t.startDate}</p>
      <button onclick="applyTraining('${t.title}')">Apply</button>
    `;

    list.appendChild(div);
  });
}

window.applyTraining=(title)=>{
  selectedTraining=title;
  trainingModal.style.display="block";
};

window.submitTrainingApp=async()=>{
  let user=auth.currentUser;

  await addDoc(collection(db,"trainingApplications"),{
    user:user.email,
    name:tName.value,
    phone:tPhone.value,
    program:selectedTraining,
    status:"pending",
    certificate:false
  });

  alert("Training application sent!");
};

window.closeTraining=()=>trainingModal.style.display="none";

/* DASHBOARD */
async function loadApps(){
  let user=auth.currentUser;
  let snap=await getDocs(collection(db,"applications"));

  myApps.innerHTML="<h3>My Job Applications</h3>";
  snap.forEach(d=>{
    let a=d.data();
    if(a.user===user.email){
      myApps.innerHTML+=`<p>${a.job}</p>`;
    }
  });
}

async function loadTrainingDashboard(){
  let user=auth.currentUser;
  let snap=await getDocs(collection(db,"trainingApplications"));

  trainingDashboard.innerHTML="<h3>🎓 My Training</h3>";

  snap.forEach(d=>{
    let t=d.data();
    if(t.user===user.email){
      trainingDashboard.innerHTML+=`
        <p>${t.program} - ${t.status} 
        ${t.certificate?"✅ Certificate":"⏳ In Progress"}
        </p>
      `;
    }
  });
}

/* COUNSELING */
window.bookSession=async()=>{
  await addDoc(collection(db,"appointments"),{
    name:name.value,age:age.value,interest:interest.value,education:education.value,goal:goal.value,date:date.value
  });
  alert("Appointment booked!");
};

/* RECOMMEND */
window.recommendTraining=()=>{
  let i=interest.value;
  let r="";
  if(i==="Hands-on work") r="Welding or Electrical";
  else if(i==="Outdoor work") r="Oil & Gas";
  else if(i==="Technical career") r="Solar Training";
  else r="Customer Service";

  recommendResult.innerText=r;
};

/* FILTER */
window.filterJobs=(text)=>{
  document.querySelectorAll("#jobList .card").forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(text.toLowerCase())?"block":"none";
  });
};

window.filterCategory=(cat)=>{
  document.querySelectorAll("#jobList .card").forEach(c=>{
    c.style.display=(cat==="All"||c.dataset.category===cat)?"block":"none";
  });
};

/* GUIDE */
window.quickStart=(t)=>{
  if(t==="fast") alert("Try helper or retail jobs");
  if(t==="skill") alert("Try training programs");
  if(t==="career") alert("Try oil & gas or renewable");
};

window.closeForm=()=>formModal.style.display="none";
</script>

</body>
</html>
