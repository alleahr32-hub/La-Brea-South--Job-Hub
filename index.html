<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Brea Job Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #dbeafe, #f0f9ff);
}

/* HEADER */
header {
  background: linear-gradient(135deg, #002855, #00a8e8);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  gap: 15px;
}

.logo {
  background: white;
  color: #002855;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* NAV */
nav {
  background: #001d3d;
  display: flex;
  justify-content: center;
}

nav a {
  color: white;
  padding: 12px;
  text-decoration: none;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: linear-gradient(145deg, #ffffff, #e6f0ff);
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
  border-left: 6px solid #00a8e8;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
}

/* BUTTON */
button {
  background: #00a8e8;
  border: none;
  padding: 10px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 5px;
}

button:hover {
  background: #0077b6;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: white;
  padding: 20px;
  max-width: 400px;
  margin: 10% auto;
  border-radius: 10px;
}

/* MOBILE */
@media (max-width:600px) {
  button { width:100%; }
}
</style>
</head>

<body>

<header>
<div class="logo">LB</div>
<div>
<h1>La Brea Job Hub</h1>
<p>South Trinidad Opportunities</p>
</div>
</header>

<nav>
<a href="#">Jobs</a>
<a href="#">Dashboard</a>
</nav>

<div class="container">

<!-- AUTH -->
<div class="card">
<h3>🔐 Account</h3>
<input id="authEmail" placeholder="Email">
<input id="authPassword" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<p id="userStatus"></p>
</div>

<!-- SEARCH -->
<input placeholder="Search jobs..." onkeyup="filterJobs(this.value)">

<select onchange="filterLocation(this.value)">
<option>All</option>
<option>Point Fortin</option>
<option>La Brea</option>
<option>San Fernando</option>
<option>Siparia</option>
</select>

<input placeholder="Enter skills (electrical, driving)" onchange="recommendJobs(this.value)">

<!-- JOB LIST -->
<div id="job-list"></div>

<!-- ADMIN -->
<div id="adminPanel" class="card" style="display:none;">
<h3>Post Job</h3>
<input id="jobTitle" placeholder="Job Title">
<input id="company" placeholder="Company">
<input id="location" placeholder="Location">
<button onclick="postJob()">Post Job</button>
</div>

<!-- USER APPLICATIONS -->
<div id="myApps" class="card"></div>

</div>

<!-- MODAL -->
<div class="modal" id="formModal">
<div class="modal-content">
<h3>Apply</h3>
<input type="file" id="resume">
<button onclick="submitApplication()">Submit</button>
<button onclick="closeForm()">Close</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "YOUR-KEY",
  authDomain: "YOUR-PROJECT.firebaseapp.com",
  projectId: "YOUR-ID",
  storageBucket: "YOUR-ID.appspot.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* AUTH */
window.signup = async () => {
  let email = authEmail.value;
  let password = authPassword.value;

  let userCred = await createUserWithEmailAndPassword(auth, email, password);

  await setDoc(doc(db, "users", userCred.user.uid), {
    email: email,
    role: "jobseeker"
  });

  alert("Account created!");
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, authEmail.value, authPassword.value);
};

/* SESSION */
onAuthStateChanged(auth, async (user) => {
  if (user) {
    userStatus.innerText = "Logged in: " + user.email;
    loadJobs();
    loadMyApps();

    const docSnap = await getDoc(doc(db, "users", user.uid));
    if (docSnap.data().role === "employer") {
      adminPanel.style.display = "block";
    }
  }
});

/* LOAD JOBS */
async function loadJobs() {
  let snapshot = await getDocs(collection(db, "jobs"));
  job-list.innerHTML = "";

  snapshot.forEach(doc => {
    let job = doc.data();

    let div = document.createElement("div");
    div.className = "card";

    let phone = "18681234567";

    div.innerHTML = `
      <h3>${job.title}</h3>
      <p>${job.company} - ${job.location}</p>

      <button onclick="apply('${job.title}')">Apply</button>

      <a href="https://wa.me/${phone}?text=Apply for ${job.title}" target="_blank">
        <button style="background:green;">WhatsApp</button>
      </a>
    `;

    job-list.appendChild(div);
  });
}

/* APPLY */
window.apply = (job) => {
  formModal.style.display = "block";
  window.selectedJob = job;
};

window.submitApplication = async () => {
  let user = auth.currentUser;
  let file = resume.files[0];

  let storageRef = ref(storage, "resumes/" + user.uid + "_" + file.name);
  await uploadBytes(storageRef, file);
  let url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "applications"), {
    user: user.email,
    job: selectedJob,
    resumeURL: url,
    date: new Date()
  });

  alert("Application sent!");
};

/* POST JOB */
window.postJob = async () => {
  await addDoc(collection(db, "jobs"), {
    title: jobTitle.value,
    company: company.value,
    location: location.value
  });

  alert("Job posted!");
  loadJobs();
};

/* FILTERS */
window.filterJobs = (text) => {
  document.querySelectorAll(".card").forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(text.toLowerCase()) ? "block" : "none";
  });
};

window.filterLocation = (loc) => {
  document.querySelectorAll(".card").forEach(card => {
    card.style.display = (loc === "All" || card.innerText.includes(loc)) ? "block" : "none";
  });
};

/* AI MATCH */
window.recommendJobs = (skills) => {
  let keys = skills.toLowerCase().split(",");
  document.querySelectorAll(".card").forEach(card => {
    if (keys.some(k => card.innerText.toLowerCase().includes(k.trim()))) {
      card.style.border = "3px solid green";
    }
  });
};

/* DASHBOARD */
async function loadMyApps() {
  let user = auth.currentUser;
  let snapshot = await getDocs(collection(db, "applications"));

  myApps.innerHTML = "<h3>My Applications</h3>";

  snapshot.forEach(doc => {
    let app = doc.data();
    if (app.user === user.email) {
      myApps.innerHTML += `<p>${app.job}</p>`;
    }
  });
}

/* MODAL */
window.closeForm = () => formModal.style.display = "none";

</script>

</body>
</html>
